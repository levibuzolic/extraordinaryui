name: Publish Site

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Static Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchains
        uses: ./.github/actions/setup-toolchains
        with:
          node-cache: npm
          node-cache-dependency-path: demo/package-lock.json

      - name: Cache Mix dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-site-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-site-

      - name: Cache demo Mix dependencies
        uses: actions/cache@v4
        with:
          path: |
            demo/deps
            demo/_build
          key: ${{ runner.os }}-mix-demo-site-${{ hashFiles('demo/mix.lock', 'mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-demo-site-
            ${{ runner.os }}-mix-demo-

      - name: Install dependencies
        run: mix deps.get

      - name: Build static site from demo app
        working-directory: demo
        run: |
          mix deps.get
          npm ci
          mix assets.build
          mix site.export

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
