name: Publish Site

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Static Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchains
        uses: ./.github/actions/setup-toolchains
        with:
          node-cache: npm
          node-cache-dependency-path: demo/package-lock.json

      - name: Setup root Mix
        uses: ./.github/actions/setup-root-mix
        with:
          cache-key-prefix: site

      - name: Setup demo Mix
        uses: ./.github/actions/setup-demo-mix
        with:
          cache-key-prefix: site

      - name: Build static site from demo app
        working-directory: demo
        run: |
          npm ci
          mix assets.build
          mix site.export

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
