name: Publish Hex

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hex-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Hex Package + Docs
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    runs-on: ubuntu-latest
    environment: hex-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchains
        uses: ./.github/actions/setup-toolchains
        with:
          node-cache: npm
          node-cache-dependency-path: demo/package-lock.json

      - name: Cache Mix dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-hex-publish-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-hex-publish-
            ${{ runner.os }}-mix-

      - name: Cache demo Mix dependencies
        uses: actions/cache@v4
        with:
          path: |
            demo/deps
            demo/_build
          key: ${{ runner.os }}-mix-demo-hex-publish-${{ hashFiles('demo/mix.lock', 'mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-demo-hex-publish-
            ${{ runner.os }}-mix-demo-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-hex-publish-${{ hashFiles('demo/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-hex-publish-
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: mix deps.get

      - name: Install demo dependencies
        working-directory: demo
        run: |
          mix deps.get
          npm ci
          mix assets.build

      - name: Install Playwright browser
        working-directory: demo
        run: npx playwright install --with-deps chromium

      - name: Generate docs screenshots
        working-directory: demo
        run: npx playwright test tests/browser/visual.spec.ts --update-snapshots

      - name: Verify Hex API key
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          if [ -z "${HEX_API_KEY:-}" ]; then
            echo "::error::Missing HEX_API_KEY secret. Configure repository or environment secret before publishing."
            exit 1
          fi

      - name: Publish package
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes

      - name: Publish docs
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish docs --yes
