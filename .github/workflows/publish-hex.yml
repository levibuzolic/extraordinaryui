name: Publish Hex

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hex-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: Publish Hex Package + Docs
    runs-on: ubuntu-latest
    environment: hex-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchains
        uses: ./.github/actions/setup-toolchains
        with:
          node-cache: npm
          node-cache-dependency-path: demo/package-lock.json

      - name: Setup root Mix
        uses: ./.github/actions/setup-root-mix
        with:
          cache-key-prefix: hex-publish

      - name: Setup demo Mix
        uses: ./.github/actions/setup-demo-mix
        with:
          cache-key-prefix: hex-publish

      - name: Verify Hex API key
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          if [ -z "${HEX_API_KEY:-}" ]; then
            echo "::error::Missing HEX_API_KEY secret. Configure the hex-publish environment or repository secret before publishing."
            exit 1
          fi

      - name: Ensure release tag matches package version
        run: |
          REF_NAME="${{ github.event.release.tag_name }}"
          if [ -z "$REF_NAME" ]; then
            REF_NAME="${GITHUB_REF_NAME}"
          fi

          TAG_VERSION="${REF_NAME#v}"
          MIX_VERSION="$(sed -nE 's/^  @version \"([^\"]+)\"/\1/p' mix.exs)"

          if [ -z "$MIX_VERSION" ]; then
            echo "Could not read @version from mix.exs"
            exit 1
          fi

          test "$TAG_VERSION" = "$MIX_VERSION" || {
            echo "Release tag ($REF_NAME) does not match mix.exs version ($MIX_VERSION)"
            exit 1
          }

      - name: Ensure prerelease metadata matches version
        run: |
          REF_NAME="${{ github.event.release.tag_name }}"
          if [ -z "$REF_NAME" ]; then
            REF_NAME="${GITHUB_REF_NAME}"
          fi

          TAG_VERSION="${REF_NAME#v}"
          IS_PRERELEASE="${{ github.event.release.prerelease }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "$TAG_VERSION" in
              *-*) IS_PRERELEASE=true ;;
              *) IS_PRERELEASE=false ;;
            esac
          fi

          case "$TAG_VERSION" in
            *-*) VERSION_IS_PRERELEASE=true ;;
            *) VERSION_IS_PRERELEASE=false ;;
          esac

          if [ "$IS_PRERELEASE" = "true" ] && [ "$VERSION_IS_PRERELEASE" != "true" ]; then
            echo "GitHub release is marked as a prerelease, but mix.exs version is not a SemVer prerelease."
            exit 1
          fi

          if [ "$IS_PRERELEASE" != "true" ] && [ "$VERSION_IS_PRERELEASE" = "true" ]; then
            echo "mix.exs version is a prerelease, but the GitHub release is not marked as a prerelease."
            exit 1
          fi

      - name: Verify formatting
        run: MIX_ENV=test mix format --check-formatted

      - name: Build demo browser environment
        uses: ./.github/actions/setup-demo-browser
        with:
          playwright-cache-key-prefix: hex-publish

      - name: Export HexDocs screenshots
        run: cd demo && CINDER_UI_EXPORT_SCREENSHOTS=1 npx playwright test tests/browser/visual.spec.ts

      - name: Run demo hook unit tests
        run: cd demo && npm run test:hooks

      - name: Compile with warnings as errors
        run: MIX_ENV=test mix compile --warnings-as-errors

      - name: Run test suite
        run: MIX_ENV=test mix test

      - name: Install production dependencies
        run: MIX_ENV=prod mix deps.get

      - name: Publish package
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: MIX_ENV=prod mix hex.publish package --yes

      - name: Install docs dependencies
        if: github.event_name != 'release' || github.event.release.prerelease == false
        run: MIX_ENV=docs mix deps.get

      - name: Publish docs
        if: github.event_name != 'release' || github.event.release.prerelease == false
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: MIX_ENV=docs mix hex.publish docs --yes
