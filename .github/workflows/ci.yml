name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root_quality:
    name: Root Quality (format/lint/docs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchains
        uses: ./.github/actions/setup-toolchains

      - name: Setup root Mix
        uses: ./.github/actions/setup-root-mix
        with:
          cache-key-prefix: root-quality

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Run Credo (strict)
        run: mix credo --strict

      - name: Build static site
        run: mix cinder_ui.docs.build

  root_tests:
    name: Root Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchains
        uses: ./.github/actions/setup-toolchains

      - name: Setup root Mix
        uses: ./.github/actions/setup-root-mix
        with:
          cache-key-prefix: root-test

      - name: Run unit tests with coverage gate + Cobertura export
        run: MIX_ENV=test mix coveralls.cobertura --raise

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: cover/cobertura.xml
          badge: true
          format: markdown
          indicators: true
          output: both
          fail_below_min: true
          thresholds: "90 95"

      - name: Publish coverage in job summary
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: root-coverage
          path: |
            cover/cobertura.xml
            cover/excoveralls.json
            cover/

  demo_unit:
    name: Demo Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchains
        uses: ./.github/actions/setup-toolchains

      - name: Setup demo Mix
        uses: ./.github/actions/setup-demo-mix
        with:
          cache-key-prefix: unit

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run demo Credo (strict)
        run: mix credo --strict

      - name: Run demo unit tests
        run: mix test

  demo_typecheck:
    name: Demo TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchains
        uses: ./.github/actions/setup-toolchains
        with:
          node-cache: npm
          node-cache-dependency-path: demo/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

  demo_browser:
    name: Demo Browser Tests (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchains
        uses: ./.github/actions/setup-toolchains
        with:
          node-cache: npm
          node-cache-dependency-path: demo/package-lock.json

      - name: Setup demo Mix
        uses: ./.github/actions/setup-demo-mix
        with:
          cache-key-prefix: browser

      - name: Setup demo browser
        uses: ./.github/actions/setup-demo-browser
        with:
          playwright-cache-key-prefix: browser

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright artifacts
        id: playwright_artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            demo/test-results
            demo/playwright-report

      - name: Annotate Playwright VRT failures
        if: failure()
        working-directory: .
        env:
          PLAYWRIGHT_RESULTS_DIR: demo/test-results
          PLAYWRIGHT_ARTIFACT_URL: ${{ steps.playwright_artifacts.outputs.artifact-url }}
          PLAYWRIGHT_VRT_MAX_INLINE: "6"
        run: node .github/scripts/playwright_vrt_report.mjs
