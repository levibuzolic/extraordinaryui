name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  root_quality:
    name: Root Quality (format/lint/docs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchains
        uses: ./.github/actions/setup-toolchains

      - name: Setup root Mix
        uses: ./.github/actions/setup-root-mix
        with:
          cache-key-prefix: root-quality

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Run Credo (strict)
        run: mix credo --strict

      - name: Build static site
        run: mix cinder_ui.docs.build

  root_tests:
    name: Root Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchains
        uses: ./.github/actions/setup-toolchains

      - name: Setup root Mix
        uses: ./.github/actions/setup-root-mix
        with:
          cache-key-prefix: root-test

      - name: Run unit tests with coverage gate + Cobertura export
        run: MIX_ENV=test mix coveralls.cobertura --raise

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: cover/cobertura.xml
          badge: true
          format: markdown
          indicators: true
          output: both
          fail_below_min: true
          thresholds: "90 95"

      - name: Publish coverage in job summary
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: root-coverage
          path: |
            cover/cobertura.xml
            cover/excoveralls.json
            cover/

  demo_unit:
    name: Demo Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchains
        uses: ./.github/actions/setup-toolchains

      - name: Setup demo Mix
        uses: ./.github/actions/setup-demo-mix
        with:
          cache-key-prefix: unit

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run demo Credo (strict)
        run: mix credo --strict

      - name: Run demo unit tests
        run: mix test

  demo_typecheck:
    name: Demo TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchains
        uses: ./.github/actions/setup-toolchains
        with:
          node-cache: npm
          node-cache-dependency-path: demo/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

  demo_browser:
    name: Demo Browser Tests (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchains
        uses: ./.github/actions/setup-toolchains
        with:
          node-cache: npm
          node-cache-dependency-path: demo/package-lock.json

      - name: Setup demo Mix
        uses: ./.github/actions/setup-demo-mix
        with:
          cache-key-prefix: browser

      - name: Setup demo browser
        uses: ./.github/actions/setup-demo-browser
        with:
          playwright-cache-key-prefix: browser

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright artifacts
        id: playwright_artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            demo/test-results
            demo/playwright-report

      - name: Generate visual autofix artifacts
        if: failure()
        run: npx playwright test tests/browser/visual.spec.ts --update-snapshots

      - name: Upload visual autofix artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-visual-autofix
          path: |
            demo/tests/browser/visual.spec.ts-snapshots
            doc/screenshots
          if-no-files-found: ignore

      - name: Annotate Playwright VRT failures
        if: failure()
        working-directory: .
        env:
          PLAYWRIGHT_RESULTS_DIR: demo/test-results
          PLAYWRIGHT_ARTIFACT_URL: ${{ steps.playwright_artifacts.outputs.artifact-url }}
          PLAYWRIGHT_VRT_MAX_INLINE: "6"
        run: node .github/scripts/playwright_vrt_report.mjs

  pr_autofix:
    name: PR Autofix
    if: >
      github.event_name == 'pull_request' &&
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      always() &&
      (
        needs.root_quality.result == 'failure' ||
        needs.demo_unit.result == 'failure' ||
        needs.demo_browser.result == 'failure'
      )
    needs:
      - root_quality
      - root_tests
      - demo_unit
      - demo_typecheck
      - demo_browser
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Verify autofix push token
        env:
          AUTOFIX_PUSH_TOKEN: ${{ secrets.AUTOFIX_PUSH_TOKEN }}
        run: |
          if [ -z "${AUTOFIX_PUSH_TOKEN:-}" ]; then
            echo "::error::Missing AUTOFIX_PUSH_TOKEN secret. Configure a PAT or GitHub App token with permission to push PR branches and trigger workflows."
            exit 1
          fi

      - name: Checkout pull request branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.AUTOFIX_PUSH_TOKEN }}

      - name: Setup toolchains
        uses: ./.github/actions/setup-toolchains
        with:
          node-cache: npm
          node-cache-dependency-path: demo/package-lock.json

      - name: Setup root Mix
        if: ${{ needs.root_quality.result == 'failure' || needs.demo_unit.result == 'failure' }}
        uses: ./.github/actions/setup-root-mix
        with:
          cache-key-prefix: pr-autofix-root

      - name: Setup demo Mix
        if: ${{ needs.root_quality.result == 'failure' || needs.demo_unit.result == 'failure' || needs.demo_browser.result == 'failure' }}
        uses: ./.github/actions/setup-demo-mix
        with:
          cache-key-prefix: pr-autofix

      - name: Fix formatting
        if: ${{ needs.root_quality.result == 'failure' || needs.demo_unit.result == 'failure' }}
        run: |
          mix format
          cd demo
          mix format

      - name: Download visual autofix artifacts
        if: ${{ needs.demo_browser.result == 'failure' }}
        uses: actions/download-artifact@v8
        with:
          name: playwright-visual-autofix
          path: .

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No autofix changes to commit."
            exit 0
          fi

          git commit -m "Apply automated formatting and snapshot updates"
          git push
